<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Me2Verse Demo</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
</head>
<body>
  <h1>🌌 Me2Verse Demo</h1>
  <p>Pi Network 로그인 및 결제 테스트</p>

  <button id="login-btn">🔑 Pi 로그인</button>
  <button id="pay-btn">💰 Pi 결제</button>

  <div id="result"></div>

  <script>
    // ✅ Pi SDK 초기화
    Pi.init({
      version: "2.0",
      sandbox: true, // testnet 모드
    });

    // ✅ 로그인 기능
    document.getElementById("login-btn").addEventListener("click", async () => {
      try {
        const scopes = ["username", "payments"];
        const authResult = await Pi.authenticate(scopes, function onIncompletePaymentFound(payment) {
          console.log("미처리 결제 발견:", payment);
        });
        document.getElementById("result").innerText =
          "✅ 로그인 성공! 사용자: " + authResult.user.username;
        console.log("로그인 결과:", authResult);
      } catch (error) {
        console.error(error);
        alert("로그인 실패: " + error.message);
      }
    });

    // ✅ 결제 기능
    document.getElementById("pay-btn").addEventListener("click", async () => {
      try {
        const paymentData = {
          amount: 1,
          memo: "Me2Verse 테스트 결제",
          metadata: { type: "test", app: "Me2Verse" },
        };
        const payment = await Pi.createPayment(paymentData, {
          onReadyForServerApproval: (paymentId) => {
            console.log("서버 승인 대기 중:", paymentId);
          },
          onReadyForServerCompletion: (paymentId, txid) => {
            console.log("서버 완료 대기 중:", paymentId, txid);
          },
          onCancel: (paymentId) => {
            console.log("결제 취소됨:", paymentId);
          },
          onError: (error, payment) => {
            console.error("결제 오류:", error, payment);
          },
        });
        document.getElementById("result").innerText =
          "✅ 결제 요청 성공! ID: " + payment.identifier;
      } catch (error) {
        console.error(error);
        alert("결제 실패: " + error.message);
      }
    });
  </script>
</body>
</html>
